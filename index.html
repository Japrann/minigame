<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minigame buatan japran</title>

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&display=swap" rel="stylesheet">

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    body {
      font-family: 'Boldonse', sans-serif;
      background: linear-gradient(135deg, #3b124785, #4b263f);
      color: rgb(255, 253, 184);
      text-align: center;
      margin: 0;
      padding: 12px;
    }

    h1 {
      margin-top: 20px;
      font-weight: 500;
      font-size: 20px;
    }

    #msg {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.85;
      min-height: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(60px, 1fr));
      gap: 10px;
      max-width: 400px;
      margin: 25px auto;
    }

    .card {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #ff4a7a;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      transition: all 0.25s ease;
    }

    .card:active {
      transform: scale(0.95);
    }

    .open {
      background: white;
      color: black;
    }

    #end {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0;
      transition: 0.5s;
    }

    .show {
      opacity: 1;
    }

    button {
      font-family: 'Archivo', sans-serif;
      margin-top: 15px;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    button:active {
      transform: scale(0.95);
    }

    @media (min-width: 600px) {
      h1 {
        font-size: 26px;
      }

      .card {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

<h1>Main ini sap kalo gabuy</h1>
<div id="msg"></div>

<div class="grid" id="grid"></div>

<div id="end"></div>
<button onclick="restart()">Pencet ini buat ngulang</button>

<script>
const items = ["🍵","🌧️","🎧","🍫","😴","📱"];
let cards = [];
let first = null;
let second = null;
let lock = false;
let matched = 0;

const messages = {
  "🍵": "ini matcha kayanya",
  "🌧️": "random aja bingung emoji apalagi jir",
  "🎧": "saranin lagu sap",
  "🍫": "ini enak banget",
  "😴": "ini juga random aja biar ga monoton HAHAHA",
  "📱": "buka reels yang gua kirim sap"
};

function shuffle() {
  return [...items, ...items].sort(() => 0.5 - Math.random());
}

function createBoard() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  cards = shuffle();
  matched = 0;

  cards.forEach((item) => {
    const div = document.createElement("div");
    div.classList.add("card");
    div.dataset.value = item;

    div.onclick = () => {
      if (lock || div.classList.contains("open")) return;

      div.textContent = item;
      div.classList.add("open");

      if (!first) {
        first = div;
      } else {
        second = div;
        lock = true;

        if (first.dataset.value === second.dataset.value) {
          matched++;
          document.getElementById("msg").textContent = messages[item];

          first = null;
          second = null;
          lock = false;

         if (matched >= items.length) {
  const endText = document.getElementById("end");
  endText.textContent = "not bad... hebat juga bisa kelarin ini";
  endText.style.opacity = "1"; // paksa muncul
}

        } else {
          setTimeout(() => {
            first.textContent = "";
            second.textContent = "";
            first.classList.remove("open");
            second.classList.remove("open");

            first = null;
            second = null;
            lock = false;
          }, 600);
        }
      }
    };

    grid.appendChild(div);
  });
}

function restart() {
  first = null;
  second = null;
  lock = false;
  document.getElementById("msg").textContent = "";
  document.getElementById("end").classList.remove("show");
  createBoard();
}

createBoard();
</script>

</body>
</html>
